<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Dubai Property Intelligence</title>
</head>
<body>
    <header>
        <h1>Dubai Property Intelligence</h1>
        <div class="header-info">
            <span id="date"></span>
            <button onclick="contactUs()">Contact</button>
        </div>
    </header>
    <nav>
        <ul>
            <li><a href="#properties">Properties</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
    <main>
        <section id="properties">
            <h2>Available Properties</h2>
            <div class="property-card"> 
                <h3>Property Name 1</h3>
                <p>Price: $1,000,000</p>
                <p>Yield: 7%</p>
                <p>Tags: Luxury, Investment</p>
            </div>
            <div class="property-card"> 
                <h3>Property Name 2</h3>
                <p>Price: $1,500,000</p>
                <p>Yield: 6%</p>
                <p>Tags: Affordable, Family</p>
            </div>
            <!-- More property cards -->
        </section>
    </main>
    <footer>
        <p>Contact us: info@dubai-property-intelligence.com</p>
    </footer>
    <script>
        document.getElementById('date').innerText = new Date().toLocaleString();
        function contactUs() {
            window.location.href = 'mailto:info@dubai-property-intelligence.com';
        }
    </script>
</body>
</html>
